<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Event Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <h1>🌱 Community Events</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="my-events.html">My Events</a></li>
        <li id="addEventLink" style="display: none;"><a href="add-event.html">Add Event</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
    <div style="color: #fff; padding: 0 2rem; text-align: right;">
      <p style="margin: 0; font-size: 0.9rem;">Welcome, <span id="userDisplay">User</span></p>
    </div>
  </nav>

  <div class="container">
    <h2 class="page-title">Upcoming Community Events</h2>

    <div class="filter-buttons" id="categoryFilter">
      <button class="filter-btn active" data-category="all">All Events</button>
    </div>

    <div id="eventsContainer" class="events-grid">
      <div class="loading">Loading events...</div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // check authentication on page load
    window.addEventListener('load', function() {
      let token = localStorage.getItem('authToken');
      let userName = localStorage.getItem('userName');
      let userRole = localStorage.getItem('userRole');
      
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      
      document.getElementById('userDisplay').textContent = userName || 'User';
      
      if (userRole === 'admin') {
        document.getElementById('addEventLink').style.display = 'block';
      }
      
      loadEvents();
    });
    
    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('userRole');
      localStorage.removeItem('userName');
      window.location.href = 'login.html';
    }
    
    // load and display events on home page
    function loadEvents() {
      let token = localStorage.getItem('authToken');
      
      fetch('/api/events', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
        .then(res => res.json())
        .then(data => {
          displayEvents(data);
          loadCategories(data);
        })
        .catch(err => {
          console.log('error loading events', err);
          document.getElementById('eventsContainer').innerHTML = '<div class="empty-state"><h3>Error loading events</h3></div>';
        });
    }

    function displayEvents(events) {
      let container = document.getElementById('eventsContainer');
      let token = localStorage.getItem('authToken');
      let currentUserId = getCurrentUserId(token);
      
      if (events.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No events found</h3><p>Check back soon or create a new event!</p></div>';
        return;
      }

      let html = '';
      
      for (let i = 0; i < events.length; i++) {
        let event = events[i];
        let isCreator = event.createdBy._id === currentUserId;
        let isAttending = false;
        
        // check if user is attending
        for (let j = 0; j < event.attendees.length; j++) {
          if (event.attendees[j]._id === currentUserId) {
            isAttending = true;
            break;
          }
        }
        
        html += `
          <div class="event-card" onclick="goToEvent('${event._id}')">
            <span class="event-category">${event.category}</span>
            <h3 class="event-title">${event.title}</h3>
            <div class="event-date">${event.date}</div>
            <div class="event-time">${event.time}</div>
            <div class="event-location">${event.location}</div>
            <p class="event-description">${event.description.substring(0, 100)}...</p>
            <div class="event-attendees">👥 ${event.attendeeCount || event.attendees.length} attending</div>
            <div class="event-buttons">
              <button class="btn-primary" onclick="event.stopPropagation(); ${isAttending ? `leaveEvent('${event._id}')` : `joinEvent('${event._id}')`}">${isAttending ? 'Leave' : 'Join'}</button>
              ${isCreator ? `<button class="btn-danger" onclick="event.stopPropagation(); deleteEvent('${event._id}')">Delete</button>` : ''}
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
    }

    function loadCategories(events) {
      let categories = [];
      
      // get unique categories
      for (let i = 0; i < events.length; i++) {
        let category = events[i].category;
        let found = false;
        
        for (let j = 0; j < categories.length; j++) {
          if (categories[j] === category) {
            found = true;
            break;
          }
        }
        
        if (!found) {
          categories.push(category);
        }
      }
      
      // build filter buttons
      let filterHtml = '<button class="filter-btn active" onclick="filterEvents(\'all\')">All Events</button>';
      
      for (let i = 0; i < categories.length; i++) {
        let cat = categories[i];
        filterHtml += `<button class="filter-btn" onclick="filterEvents('${cat}')">${cat}</button>`;
      }
      
      document.getElementById('categoryFilter').innerHTML = filterHtml;
    }

    function filterEvents(category) {
      let token = localStorage.getItem('authToken');
      
      // update active button
      let buttons = document.querySelectorAll('.filter-btn');
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
      }
      
      event.target.classList.add('active');
      
      // fetch and filter events
      fetch('/api/events', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
        .then(res => res.json())
        .then(data => {
          if (category === 'all') {
            displayEvents(data);
          } else {
            let filtered = [];
            for (let i = 0; i < data.length; i++) {
              if (data[i].category === category) {
                filtered.push(data[i]);
              }
            }
            displayEvents(filtered);
          }
        });
    }

    function goToEvent(eventId) {
      window.location.href = 'event-detail.html?id=' + eventId;
    }

    function joinEvent(eventId) {
      let token = localStorage.getItem('authToken');
      
      fetch('/api/events/' + eventId + '/join', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert(data.error);
          } else {
            alert('You joined the event!');
            loadEvents();
          }
        })
        .catch(err => {
          console.log('error joining event', err);
          alert('Error joining event');
        });
    }

    function leaveEvent(eventId) {
      let token = localStorage.getItem('authToken');
      
      fetch('/api/events/' + eventId + '/leave', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
        .then(res => res.json())
        .then(data => {
          alert('You left the event');
          loadEvents();
        })
        .catch(err => {
          console.log('error leaving event', err);
          alert('Error leaving event');
        });
    }

    function deleteEvent(eventId) {
      if (confirm('Are you sure you want to delete this event?')) {
        let token = localStorage.getItem('authToken');
        
        fetch('/api/events/' + eventId, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        })
          .then(res => res.json())
          .then(data => {
            alert('Event deleted');
            loadEvents();
          })
          .catch(err => {
            console.log('error deleting event', err);
            alert('Error deleting event');
          });
      }
    }
    
    function getCurrentUserId(token) {
      if (!token) return null;
      try {
        let parts = token.split('.');
        let payload = JSON.parse(atob(parts[1]));
        return payload.id;
      } catch (err) {
        return null;
      }
    }
  </script>
</body>
</html>
